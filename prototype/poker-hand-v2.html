<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Easy Paste — Poker Hand V2 Study</title>
<style>
  :root {
    color-scheme: dark;
    --text: #f6efe3;
    --text-soft: #c9c0b2;
    --text-muted: #80786d;
    --gold: #d6b66e;
    --blue: #77a8ff;
    --mint: #7bd7bd;
    --rose: #e18aa4;
    --violet: #b5a8ff;
    --card-w: clamp(156px, 17.2vw, 218px);
    --card-h: calc(var(--card-w) * 1.255);
    --radius: 14px;
    --stage-h: clamp(310px, 43vh, 455px);
    --bottom-bury: clamp(82px, 9.5vw, 118px);
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    height: 100%;
  }

  body {
    margin: 0;
    overflow: hidden;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    letter-spacing: 0;
    background:
      linear-gradient(135deg, rgba(119, 168, 255, 0.12), transparent 34%),
      linear-gradient(235deg, rgba(123, 215, 189, 0.10), transparent 37%),
      linear-gradient(180deg, #27292d 0%, #15171b 48%, #08090c 100%);
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.014) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: linear-gradient(to bottom, transparent, black 16%, black 74%, transparent);
  }

  .desktop {
    position: fixed;
    inset: 0;
    padding: clamp(18px, 3vw, 38px) clamp(18px, 5vw, 68px) calc(var(--stage-h) * 0.34);
  }

  .workspace {
    position: relative;
    height: 100%;
    min-height: 310px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.10);
    border-radius: 14px;
    background:
      linear-gradient(180deg, rgba(44, 47, 52, 0.92), rgba(21, 23, 27, 0.88)),
      #17191d;
    box-shadow: 0 28px 90px rgba(0, 0, 0, 0.42);
  }

  .workspace::after {
    content: "";
    position: absolute;
    inset: auto 0 0;
    height: 45%;
    pointer-events: none;
    background:
      linear-gradient(180deg, transparent, rgba(6, 7, 10, 0.78)),
      radial-gradient(ellipse at 50% 100%, rgba(214, 182, 110, 0.12), transparent 64%);
  }

  .window-bar {
    height: 34px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 14px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    background: #303237;
  }

  .dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
  }

  .dot.red { background: #ff5f57; }
  .dot.yellow { background: #febc2e; }
  .dot.green { background: #28c840; }

  .window-title {
    margin-left: 10px;
    color: rgba(246, 239, 227, 0.46);
    font-size: 12px;
    font-weight: 550;
  }

  .editor {
    display: grid;
    grid-template-columns: 44px 1fr;
    gap: 18px;
    padding: 22px 24px;
    color: rgba(246, 239, 227, 0.56);
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: clamp(11px, 1vw, 13px);
    line-height: 1.78;
  }

  .line-numbers {
    color: rgba(246, 239, 227, 0.20);
    text-align: right;
  }

  .code span {
    color: rgba(119, 168, 255, 0.86);
  }

  .code b {
    color: rgba(123, 215, 189, 0.86);
    font-weight: 500;
  }

  .hand-stage {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 20;
    height: var(--stage-h);
    overflow: hidden;
    pointer-events: none;
    perspective: 1200px;
  }

  .hand-stage::before {
    content: "";
    position: absolute;
    left: 50%;
    bottom: -138px;
    width: min(1040px, 92vw);
    height: 300px;
    border-radius: 50%;
    background:
      radial-gradient(ellipse at center, rgba(214, 182, 110, 0.24), rgba(119, 168, 255, 0.12) 38%, transparent 74%);
    filter: blur(22px);
    opacity: 0.95;
    transform: translateX(-50%);
  }

  .hand-stage::after {
    content: "";
    position: absolute;
    inset: auto 0 0;
    height: 42%;
    background: linear-gradient(180deg, transparent, rgba(3, 4, 6, 0.72));
    pointer-events: none;
  }

  .grip-shadow {
    position: absolute;
    left: 50%;
    bottom: -30px;
    width: min(720px, 78vw);
    height: 110px;
    border-radius: 50%;
    background:
      radial-gradient(ellipse at center, rgba(0, 0, 0, 0.70), rgba(0, 0, 0, 0.18) 48%, transparent 76%);
    filter: blur(12px);
    transform: translateX(-50%);
    opacity: 0.86;
  }

  .hand {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: auto;
    touch-action: none;
  }

  .card {
    --x: 0px;
    --y: 0px;
    --rot: 0deg;
    --scale: 1;
    --tilt: 0deg;
    --accent: var(--gold);
    --delay: 0ms;
    position: absolute;
    left: 50%;
    bottom: calc(var(--bottom-bury) * -1);
    z-index: var(--z, 1);
    width: var(--card-w);
    height: var(--card-h);
    color: var(--text);
    border: 1px solid #343a42;
    border-radius: var(--radius);
    background:
      linear-gradient(180deg, #292d34 0%, #151922 34%, #090b11 100%);
    box-shadow:
      0 17px 34px rgba(0, 0, 0, 0.46),
      inset 0 1px 0 rgba(255, 255, 255, 0.10);
    overflow: hidden;
    transform:
      translateX(calc(-50% + var(--x)))
      translateY(var(--y))
      rotate(var(--rot))
      rotateX(var(--tilt))
      scale(var(--scale));
    transform-origin: 50% 118%;
    transition:
      transform 360ms cubic-bezier(0.19, 0.92, 0.25, 1),
      border-color 220ms ease,
      box-shadow 220ms ease,
      filter 220ms ease;
    transition-delay: var(--delay);
    will-change: transform;
    animation: deal-in 620ms cubic-bezier(0.16, 1, 0.28, 1) both;
    animation-delay: calc(var(--deal, 0) * 46ms);
  }

  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    background:
      radial-gradient(circle at var(--glint-x, 50%) var(--glint-y, 18%), rgba(255, 255, 255, 0.14), transparent 22%),
      linear-gradient(136deg, rgba(255, 255, 255, 0.11), transparent 28%),
      radial-gradient(ellipse at 50% 104%, color-mix(in srgb, var(--accent) 18%, transparent), transparent 46%);
    opacity: 0.68;
  }

  .card::after {
    content: "";
    position: absolute;
    left: 11%;
    right: 11%;
    bottom: -26px;
    height: 32px;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.58);
    filter: blur(13px);
    opacity: 0.76;
    pointer-events: none;
  }

  .card[data-side="left"] {
    filter: brightness(0.82) saturate(0.86);
  }

  .card[data-side="right"] {
    filter: brightness(0.96) saturate(0.98);
  }

  .card.selected {
    border-color: color-mix(in srgb, var(--accent) 72%, white 16%);
    filter: brightness(1.06) saturate(1.02);
    box-shadow:
      0 38px 82px rgba(0, 0, 0, 0.64),
      0 0 0 1px color-mix(in srgb, var(--accent) 38%, transparent),
      0 0 34px color-mix(in srgb, var(--accent) 15%, transparent),
      inset 0 1px 0 rgba(255, 255, 255, 0.15);
  }

  .card.focus-near {
    filter: brightness(1.03) saturate(1.02);
    border-color: #4a5360;
  }

  .strip {
    position: absolute;
    inset: 0 0 auto;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), rgba(255, 255, 255, 0.22));
  }

  .corner {
    position: absolute;
    left: 14px;
    top: 12px;
    width: 30px;
    display: grid;
    place-items: center;
    gap: 3px;
    color: var(--accent);
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: 10.5px;
    font-weight: 800;
  }

  .corner i {
    width: 6px;
    height: 6px;
    display: block;
    background: currentColor;
    transform: rotate(45deg);
    opacity: 0.54;
  }

  .title {
    position: absolute;
    left: 56px;
    right: 50px;
    top: 12px;
    min-width: 0;
  }

  .title strong,
  .title span {
    display: block;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }

  .title strong {
    color: #f8f0e2;
    font-size: 13px;
    font-weight: 800;
  }

  .title span {
    margin-top: 4px;
    color: var(--text-muted);
    font-size: 10.5px;
    font-weight: 650;
  }

  .badge {
    position: absolute;
    right: 14px;
    top: 13px;
    width: 33px;
    height: 33px;
    display: grid;
    place-items: center;
    border: 1px solid #323946;
    border-radius: 9px;
    background: linear-gradient(180deg, #202633, #0e121a);
    color: var(--accent);
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: 10px;
    font-weight: 850;
  }

  .preview {
    position: absolute;
    left: 14px;
    right: 14px;
    top: 68px;
    bottom: 44px;
    overflow: hidden;
    border: 1px solid #2f3742;
    border-radius: 9px;
    background: linear-gradient(180deg, #121722 0%, #080b12 100%);
  }

  .preview p,
  .preview pre {
    position: relative;
    z-index: 1;
    margin: 0;
    padding: 11px 12px;
    color: #cfc5b6;
    font-size: 12px;
    line-height: 1.42;
  }

  .preview pre {
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: 10.8px;
    white-space: pre-wrap;
  }

  .preview .url-bar {
    height: 30px;
    border-bottom: 1px solid #2b3340;
  }

  .preview .url-bar span {
    display: inline-block;
    width: 5px;
    height: 5px;
    margin: 13px 0 0 5px;
    border-radius: 50%;
    background: #6f7782;
  }

  .preview .url-bar span:first-child {
    margin-left: 11px;
  }

  .image-art {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(135deg, color-mix(in srgb, var(--accent) 18%, transparent), transparent 46%),
      linear-gradient(315deg, rgba(119, 168, 255, 0.10), transparent 48%),
      #0b0f17;
  }

  .image-art::before {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    width: 72%;
    aspect-ratio: 1.5;
    border: 1px solid #344052;
    border-radius: 8px;
    background:
      linear-gradient(135deg, rgba(255, 255, 255, 0.05), transparent 45%),
      linear-gradient(180deg, #192231, #0b1019);
    box-shadow: 0 18px 32px rgba(0, 0, 0, 0.28);
    transform: translate(-50%, -50%);
  }

  .image-art::after {
    content: "";
    position: absolute;
    left: 38%;
    top: 42%;
    width: 26%;
    aspect-ratio: 1;
    border: 2px solid color-mix(in srgb, var(--accent) 68%, white 10%);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.82;
  }

  .footer {
    position: absolute;
    left: 14px;
    right: 14px;
    bottom: 11px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-muted);
    font-size: 10.5px;
    font-weight: 700;
  }

  .footer .source {
    min-width: 0;
    flex: 1;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }

  .footer .key {
    color: #d8ccb9;
    font-size: 11px;
    font-weight: 850;
  }

  .selection-line {
    position: absolute;
    left: 17px;
    right: 17px;
    bottom: 8px;
    height: 2px;
    border-radius: 999px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--blue), transparent);
    opacity: 0;
  }

  .selected .selection-line {
    opacity: 1;
  }

  .queue-hint {
    position: fixed;
    left: 50%;
    bottom: clamp(12px, 2vh, 22px);
    z-index: 30;
    display: flex;
    gap: 5px;
    transform: translateX(-50%);
    pointer-events: none;
  }

  .queue-hint span {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #4a515d;
  }

  .queue-hint span.active {
    width: 18px;
    border-radius: 999px;
    background: var(--gold);
  }

  @keyframes deal-in {
    from {
      opacity: 0;
      transform:
        translateX(calc(-50% + var(--x)))
        translateY(calc(var(--y) + 150px))
        rotate(calc(var(--rot) - 8deg))
        rotateX(8deg)
        scale(0.94);
    }
    to {
      opacity: 1;
      transform:
        translateX(calc(-50% + var(--x)))
        translateY(var(--y))
        rotate(var(--rot))
        rotateX(var(--tilt))
        scale(var(--scale));
    }
  }

  @media (max-width: 720px) {
    :root {
      --stage-h: clamp(292px, 45vh, 390px);
      --card-w: clamp(142px, 39vw, 170px);
      --bottom-bury: 86px;
    }

    .desktop {
      padding: 14px 14px calc(var(--stage-h) * 0.28);
    }

    .workspace {
      border-radius: 12px;
    }

    .editor {
      grid-template-columns: 32px 1fr;
      gap: 12px;
      padding: 18px 16px;
      font-size: 11px;
    }

    .title strong {
      font-size: 12px;
    }

    .preview p,
    .preview pre {
      font-size: 10.8px;
      line-height: 1.36;
      padding: 10px;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .card {
      animation: none;
      transition: none;
    }
  }
</style>
</head>
<body>
  <main class="desktop" aria-hidden="true">
    <section class="workspace">
      <div class="window-bar">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
        <span class="window-title">Notes.swift</span>
      </div>
      <div class="editor">
        <div class="line-numbers">01<br>02<br>03<br>04<br>05<br>06<br>07<br>08<br>09<br>10<br>11<br>12</div>
        <div class="code">
          <span>struct</span> ClipCandidate {<br>
          &nbsp;&nbsp;<span>let</span> source: String<br>
          &nbsp;&nbsp;<span>let</span> capturedAt: Date<br>
          &nbsp;&nbsp;<span>let</span> kind: ClipboardKind<br>
          }<br><br>
          <span>func</span> paste(_ item: ClipCandidate) {<br>
          &nbsp;&nbsp;<b>guard</b> item.isReadable <b>else</b> { return }<br>
          &nbsp;&nbsp;panel.select(item)<br>
          }
        </div>
      </div>
    </section>
  </main>

  <section class="hand-stage" aria-label="Easy Paste poker hand prototype">
    <div class="grip-shadow"></div>
    <div class="hand" id="hand"></div>
  </section>
  <div class="queue-hint" id="queueHint"></div>

<script>
(() => {
  const cards = [
    {
      type: "TEXT",
      source: "WeWork",
      time: "刚刚",
      rank: "A",
      accent: "#d6b66e",
      body: "这版需要更像真实手牌：底部被握住，中心牌被抽出，左右卡只承担上下文。",
      footer: "public.text",
      key: "⌘1"
    },
    {
      type: "IMG",
      source: "Safari",
      time: "1 分钟",
      rank: "K",
      accent: "#77a8ff",
      image: true,
      footer: "1240 × 860",
      key: "⌘2"
    },
    {
      type: "JSON",
      source: "Cursor",
      time: "3 分钟",
      rank: "Q",
      accent: "#7bd7bd",
      code: "{\n  \"mode\": \"hand\",\n  \"selected\": 0,\n  \"loop\": true\n}",
      footer: "application/json",
      key: "⌘3"
    },
    {
      type: "URL",
      source: "Chrome",
      time: "6 分钟",
      rank: "J",
      accent: "#b5a8ff",
      url: "https://developer.apple.com/design/human-interface-guidelines",
      footer: "developer.apple.com",
      key: "⌘4"
    },
    {
      type: "PIN",
      source: "Raycast",
      time: "昨天",
      rank: "10",
      accent: "#e18aa4",
      body: "固定片段：产品发布前检查清单、文案语气、下载地址和签名哈希。",
      footer: "Pinned",
      key: ""
    },
    {
      type: "CODE",
      source: "Xcode",
      time: "周二",
      rank: "9",
      accent: "#d6b66e",
      code: "let profile = handLayout(\n  aspect: screen.width / screen.height\n)",
      footer: "Swift",
      key: ""
    },
    {
      type: "TEXT",
      source: "Notes",
      time: "周一",
      rank: "8",
      accent: "#7bd7bd",
      body: "左侧补位只做低注意力上下文；真正高频选择集中在中心和右侧。",
      footer: "plain text",
      key: ""
    }
  ];

  const hand = document.getElementById("hand");
  const queueHint = document.getElementById("queueHint");
  const visibleOffsets = [-3, -2, -1, 0, 1, 2, 3];
  let selected = 0;
  let pointer = null;
  let dragging = false;
  let dragStartX = 0;

  function mod(n, m) {
    return ((n % m) + m) % m;
  }

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function renderCards() {
    hand.innerHTML = "";
    for (const offset of visibleOffsets) {
      const data = cards[mod(selected + offset, cards.length)];
      const el = document.createElement("article");
      el.className = "card";
      el.dataset.offset = String(offset);
      el.dataset.side = offset < 0 ? "left" : offset > 0 ? "right" : "center";
      el.style.setProperty("--accent", data.accent);
      el.style.setProperty("--deal", String(visibleOffsets.indexOf(offset)));
      el.innerHTML = cardHTML(data, offset);
      el.addEventListener("click", () => {
        if (offset !== 0) {
          select(selected + offset);
        }
      });
      hand.appendChild(el);
    }
    renderDots();
    layoutCards(false);
  }

  function cardHTML(data, offset) {
    const preview = data.image
      ? `<div class="image-art"></div>`
      : data.url
        ? `<div class="url-bar"><span></span><span></span><span></span></div><p>${escapeHTML(data.url)}</p>`
        : data.code
          ? `<pre>${escapeHTML(data.code)}</pre>`
          : `<p>${escapeHTML(data.body)}</p>`;
    const key = offset >= 0 && offset <= 3 ? (data.key || "") : "";
    return `
      <div class="strip"></div>
      <div class="corner"><span>${escapeHTML(data.rank)}</span><i></i></div>
      <div class="title">
        <strong>${escapeHTML(data.type)}</strong>
        <span>${escapeHTML(data.time)} · ${escapeHTML(data.source)}</span>
      </div>
      <div class="badge">${escapeHTML(data.type.slice(0, 3))}</div>
      <div class="preview">${preview}</div>
      <div class="footer">
        <span class="source">${escapeHTML(data.footer)}</span>
        <span class="key">${escapeHTML(key)}</span>
      </div>
      <div class="selection-line"></div>
    `;
  }

  function escapeHTML(value) {
    return String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll("\"", "&quot;");
  }

  function renderDots() {
    queueHint.innerHTML = cards
      .map((_, index) => `<span class="${index === selected ? "active" : ""}"></span>`)
      .join("");
  }

  function select(next) {
    selected = mod(next, cards.length);
    renderCards();
  }

  function layoutCards(fromPointer) {
    const stage = hand.getBoundingClientRect();
    const sampleCard = hand.querySelector(".card");
    const cardWidth = sampleCard?.offsetWidth || clamp(window.innerWidth * 0.172, 156, 218);
    const aspect = window.innerWidth / Math.max(window.innerHeight, 1);
    const wide = clamp((aspect - 1.62) / 0.68, 0, 1);
    const narrow = clamp((1.52 - aspect) / 0.58, 0, 1);
    const spreadScale = 1 + wide * 0.14 - narrow * 0.24;
    const curveScale = 1 + wide * 0.12 - narrow * 0.22;
    const rotationScale = 1 + wide * 0.13 - narrow * 0.30;
    const spread = clamp(window.innerWidth * 0.105 * spreadScale, cardWidth * 0.52, cardWidth * 0.86);
    const selectedLift = 154 + wide * 10 - narrow * 24;

    hand.querySelectorAll(".card").forEach((card, i) => {
      const offset = Number(card.dataset.offset);
      const distance = Math.abs(offset);
      const sign = offset === 0 ? 0 : offset > 0 ? 1 : -1;
      const attentionBias = offset < 0 ? -0.08 * distance : 0.02 * distance;
      let x = sign * Math.pow(distance, 1.10) * spread;
      let y = -(52 - Math.pow(distance, 1.42) * 18 * curveScale);
      let rotation = -offset * 5.8 * rotationScale;
      let scale = 0.992 - distance * 0.010 + attentionBias;
      let tilt = 0;

      if (offset === 0) {
        y = -selectedLift;
        rotation *= 0.14;
        scale = 1.060 + wide * 0.006 - narrow * 0.016;
        tilt = -1.2;
      } else if (distance <= 2) {
        const give = 3 - distance;
        x += sign * give * (18 + wide * 4 - narrow * 6);
        y -= give * (12 + wide * 2 - narrow * 4);
        rotation -= sign * give * 1.5 * rotationScale;
      }

      if (pointer) {
        const centerX = window.innerWidth / 2 + x;
        const dx = pointer.x - centerX;
        const pointerYFromTop = stage.height - pointer.y;
        const proximity = clamp(1 - Math.abs(dx) / (cardWidth * 1.55), 0, 1);
        const lowerZone = clamp((pointerYFromTop - stage.height * 0.44) / (stage.height * 0.48), 0, 1);
        const pull = proximity * lowerZone;
        if (pull > 0.01) {
          if (offset === 0) {
            y -= pull * 9;
            tilt -= pull * 1.8;
          } else {
            y -= pull * 42;
            scale += pull * 0.025;
            tilt -= pull * 2.2;
          }
          x -= dx * pull * 0.034;
          rotation -= clamp(dx / cardWidth, -1, 1) * pull * 4.4;
          card.classList.add("focus-near");
          card.style.setProperty("--glint-x", `${clamp((pointer.x - (window.innerWidth / 2 + x - cardWidth / 2)) / cardWidth * 100, 8, 92)}%`);
          card.style.setProperty("--glint-y", `${clamp((pointer.y / stage.height) * 100, 8, 80)}%`);
        } else {
          card.classList.remove("focus-near");
        }
      } else {
        card.classList.remove("focus-near");
        card.style.removeProperty("--glint-x");
        card.style.removeProperty("--glint-y");
      }

      card.classList.toggle("selected", offset === 0);
      card.style.setProperty("--x", `${x.toFixed(1)}px`);
      card.style.setProperty("--y", `${y.toFixed(1)}px`);
      card.style.setProperty("--rot", `${rotation.toFixed(2)}deg`);
      card.style.setProperty("--tilt", `${tilt.toFixed(2)}deg`);
      card.style.setProperty("--scale", scale.toFixed(4));
      card.style.setProperty("--z", String(offset === 0 ? 100 : 72 - distance * 12 + (offset > 0 ? 4 : 0)));
      card.style.setProperty("--delay", fromPointer ? "0ms" : `${Math.abs(i - 3) * 18}ms`);
    });
  }

  hand.addEventListener("pointermove", (event) => {
    const rect = hand.getBoundingClientRect();
    pointer = {
      x: event.clientX,
      y: event.clientY - rect.top
    };
    layoutCards(true);
  });

  hand.addEventListener("pointerleave", () => {
    pointer = null;
    dragging = false;
    layoutCards(true);
  });

  hand.addEventListener("pointerdown", (event) => {
    dragging = true;
    dragStartX = event.clientX;
    hand.setPointerCapture(event.pointerId);
  });

  hand.addEventListener("pointerup", (event) => {
    if (!dragging) return;
    const dx = event.clientX - dragStartX;
    dragging = false;
    if (Math.abs(dx) > 54) {
      select(selected + (dx < 0 ? 1 : -1));
    }
  });

  window.addEventListener("keydown", (event) => {
    if (event.key === "ArrowRight") {
      select(selected + 1);
    } else if (event.key === "ArrowLeft") {
      select(selected - 1);
    }
  });

  window.addEventListener("resize", () => layoutCards(false));

  renderCards();
})();
</script>
</body>
</html>
